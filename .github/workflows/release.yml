name: Auto Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          # Get previous tag
          PREV_TAG=$(git tag --list 'v*' --sort=-version:refname | grep -v -- '-' | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git tag --list 'v*' --sort=-version:refname | sed -n '2p')
          fi
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s" ${PREV_TAG}..HEAD)
          fi
          DELIMITER="COMMITS_$(openssl rand -hex 8)"
          echo "COMMITS<<$DELIMITER" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "$DELIMITER" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          body: |
            ## What's Changed
            ${{ steps.changelog.outputs.COMMITS }}

            ## Installation
            ```
            /plugin install odsp-microsoft/foundry
            ```

            > **Copilot CLI only** — requires multi-model orchestration (Claude + Codex + Gemini).
